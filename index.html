<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exoplanet Habitability Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #020818;
    color: #c8e6ff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Starfield ── */
  #stars {
    position: fixed; inset: 0; z-index: 0;
    background: transparent;
    pointer-events: none;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 1; } }

  /* ── Layout ── */
  .container {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  header { text-align: center; margin-bottom: 48px; }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #00e5ff, #7b2fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .subtitle {
    margin-top: 8px;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    color: #4a7fa5;
    text-transform: uppercase;
  }
  .divider {
    margin: 18px auto 0;
    width: 180px; height: 1px;
    background: linear-gradient(90deg, transparent, #00e5ff, transparent);
  }

  /* ── Panel ── */
  .panel {
    background: rgba(5, 18, 40, 0.85);
    border: 1px solid rgba(0, 229, 255, 0.18);
    border-radius: 12px;
    padding: 32px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 40px rgba(0, 229, 255, 0.06), inset 0 0 40px rgba(0,0,0,0.3);
  }

  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: #00e5ff;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(0,229,255,0.2);
  }

  /* ── Grid of inputs ── */
  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: #4a9ec4;
    text-transform: uppercase;
  }
  .field .unit {
    font-size: 0.6rem;
    color: #2a5a78;
  }
  .field input {
    background: rgba(0, 229, 255, 0.04);
    border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 6px;
    color: #e0f4ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
  }
  .field input::placeholder { color: #1e4060; }

  /* ── Scan button ── */
  .btn-scan {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(123,47,255,0.12));
    border: 1px solid rgba(0,229,255,0.35);
    border-radius: 8px;
    color: #00e5ff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .btn-scan::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(123,47,255,0.1));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn-scan:hover::before { opacity: 1; }
  .btn-scan:hover { box-shadow: 0 0 24px rgba(0,229,255,0.25); }
  .btn-scan:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Loading bar ── */
  .scan-line {
    display: none;
    height: 2px;
    margin-top: 16px;
    border-radius: 2px;
    background: linear-gradient(90deg, transparent, #00e5ff, transparent);
    background-size: 200% 100%;
    animation: scanMove 1.2s linear infinite;
  }
  @keyframes scanMove {
    0%   { background-position: -100% 0; }
    100% { background-position: 200% 0; }
  }
  .scan-line.active { display: block; }

  /* ── Result panel ── */
  #result { display: none; margin-top: 28px; }

  .esi-row {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  /* Circular ESI gauge */
  .gauge-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
  .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .gauge-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .gauge-fill {
    fill: none; stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 326;
    stroke-dashoffset: 326;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1), stroke 0.4s;
  }
  .gauge-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .gauge-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1;
  }
  .gauge-label {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: #4a7fa5;
    margin-top: 4px;
  }

  .esi-meta { flex: 1; min-width: 180px; }
  .tier-badge {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid currentColor;
    margin-bottom: 10px;
  }
  .esi-desc { font-size: 0.75rem; color: #4a7fa5; line-height: 1.6; }

  /* Insight */
  .insight-box {
    background: rgba(0,229,255,0.03);
    border-left: 2px solid rgba(0,229,255,0.3);
    border-radius: 4px;
    padding: 16px 20px;
    font-size: 0.82rem;
    line-height: 1.8;
    color: #a0c8e0;
  }

  /* Error */
  .error-msg {
    color: #ff4466;
    font-size: 0.8rem;
    margin-top: 12px;
    display: none;
  }

  /* Scan line overlay animation on submit */
  @keyframes scanoverlay {
    0%   { top: -100%; }
    100% { top: 100%; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="container">
  <header>
    <div class="logo">⬡ EXOPLANET HABITABILITY SCANNER</div>
    <div class="subtitle">Earth Similarity Index · AI-Powered Analysis · NASA Data</div>
    <div class="divider"></div>
  </header>

  <div class="panel">
    <div class="section-label">Planet Parameters</div>

    <div class="input-grid">
      <div class="field">
        <label>Planet Radius <span class="unit">( Earth radii )</span></label>
        <input type="number" id="pl_rade" placeholder="e.g. 1.1" step="any" />
      </div>
      <div class="field">
        <label>Planet Mass <span class="unit">( Earth masses )</span></label>
        <input type="number" id="pl_bmasse" placeholder="e.g. 1.2" step="any" />
      </div>
      <div class="field">
        <label>Orbital Distance <span class="unit">( AU )</span></label>
        <input type="number" id="pl_orbsmax" placeholder="e.g. 1.0" step="any" />
      </div>
      <div class="field">
        <label>Insolation Flux <span class="unit">( Earth = 1 )</span></label>
        <input type="number" id="pl_insol" placeholder="e.g. 0.9" step="any" />
      </div>
      <div class="field">
        <label>Star Temperature <span class="unit">( Kelvin )</span></label>
        <input type="number" id="st_teff" placeholder="e.g. 5778" step="any" />
      </div>
      <div class="field">
        <label>Star Mass <span class="unit">( Solar masses )</span></label>
        <input type="number" id="st_mass" placeholder="e.g. 1.0" step="any" />
      </div>
      <div class="field">
        <label>Star Radius <span class="unit">( Solar radii )</span></label>
        <input type="number" id="st_rad" placeholder="e.g. 1.0" step="any" />
      </div>
    </div>

    <button class="btn-scan" id="scanBtn" onclick="runScan()">
      ◈ &nbsp; INITIATE PLANETARY SCAN
    </button>
    <div class="scan-line" id="scanLine"></div>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Result -->
    <div id="result">
      <div class="section-label" style="margin-top:28px;">Analysis Result</div>

      <div class="esi-row">
        <div class="gauge-wrap">
          <svg viewBox="0 0 110 110">
            <circle class="gauge-bg" cx="55" cy="55" r="52"/>
            <circle class="gauge-fill" id="gaugeFill" cx="55" cy="55" r="52"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-value" id="gaugeValue">—</div>
            <div class="gauge-label">ESI SCORE</div>
          </div>
        </div>

        <div class="esi-meta">
          <div class="tier-badge" id="tierBadge">—</div>
          <div class="esi-desc">
            Earth Similarity Index measures how physically similar a planet is to Earth.
            Scale: 0 (no similarity) → 1.0 (identical to Earth).
          </div>
        </div>
      </div>

      <div class="section-label">Gemini Analysis</div>
      <div class="insight-box" id="insightBox">—</div>
    </div>
  </div>
</div>

<script>
// ── Starfield ──────────────────────────────────────
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 200; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      opacity:${Math.random()};
    `;
    container.appendChild(s);
  }
})();

// ── Scan ───────────────────────────────────────────
async function runScan() {
  const ids = ['pl_rade','pl_bmasse','pl_orbsmax','pl_insol','st_teff','st_mass','st_rad'];
  const body = {};
  for (const id of ids) {
    const val = parseFloat(document.getElementById(id).value);
    if (isNaN(val)) {
      showError('⚠ All fields are required.'); return;
    }
    body[id] = val;
  }

  const btn = document.getElementById('scanBtn');
  const scanLine = document.getElementById('scanLine');
  const errMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = '◈  SCANNING...';
  scanLine.classList.add('active');
  errMsg.style.display = 'none';
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    renderResult(data);
  } catch(e) {
    showError('⚠ Scan failed. Check your inputs or try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '◈ &nbsp; INITIATE PLANETARY SCAN';
    scanLine.classList.remove('active');
  }
}

function renderResult(data) {
  // Gauge
  const circumference = 326;
  const offset = circumference - (data.esi * circumference);
  const fill = document.getElementById('gaugeFill');
  fill.style.strokeDashoffset = offset;
  fill.style.stroke = data.color;

  document.getElementById('gaugeValue').textContent = data.esi.toFixed(3);
  document.getElementById('gaugeValue').style.color = data.color;

  // Badge
  const badge = document.getElementById('tierBadge');
  badge.textContent = data.tier;
  badge.style.color = data.color;
  badge.style.borderColor = data.color;
  badge.style.boxShadow = `0 0 12px ${data.color}44`;

  // Insight
  document.getElementById('insightBox').textContent = data.insight;

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
